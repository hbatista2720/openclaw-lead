name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /root/openclaw-lead
            git pull origin main
            docker compose down
            docker compose up -d
